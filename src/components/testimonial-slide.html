<div class="swiper-slide">
	<!-- Video Testimonial -->
	<div class="flex flex-col">
		<!-- Video -->
		<div class="relative mb-4 bg-white md:mb-5">
			<script
				src="https://fast.wistia.com/embed/{{wistiaId}}.js"
				async
				type="module"
			></script>
			<style>
				wistia-player[media-id='{{wistiaId}}']:not(:defined) {
					background: center / contain no-repeat
						url('https://fast.wistia.com/embed/medias/{{wistiaId}}/swatch');
					display: block;
					filter: blur(5px);
					padding-top: 56.25%;
				}
			</style>
			<wistia-player
				media-id="{{ wistiaId }}"
				aspect="1.7777777777777777"
			></wistia-player>
		</div>
		<div class="mb-1 md:mb-2">
			<p class="md:text-[17px]">{{ quote }}</p>
		</div>
		<div class="flex flex-col">
			<div class="text-lg font-semibold text-sage md:text-xl">
				{{ name }}
			</div>
			<div class="text-xs font-medium md:text-sm">{{ occupation }}</div>
		</div>
	</div>
</div>
